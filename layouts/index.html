<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>codyolsen.com</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;700&display=swap');

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #050508;
      overflow: hidden;
      cursor: crosshair;
      font-family: 'Instrument Sans', sans-serif;
      -webkit-user-select: none;
      user-select: none;
    }

    canvas {
      display: block;
      position: fixed;
      top: 0;
      left: 0;
    }

    .hint {
      position: fixed;
      bottom: 32px;
      left: 0;
      right: 0;
      text-align: center;
      color: rgba(255, 255, 255, 0.25);
      font-size: 13px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      pointer-events: none;
      transition: opacity 2s ease;
      z-index: 10;
    }

    .hint.hidden { opacity: 0; }

    .drag-line {
      position: fixed;
      pointer-events: none;
      z-index: 5;
    }
  </style>
</head>
<body>
  <canvas id="c"></canvas>
  <div class="hint" id="hint">click &amp; drag to launch</div>

  <script>
  (() => {
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    const hint = document.getElementById('hint');
    let W, H, dpr;

    function resize() {
      dpr = Math.min(window.devicePixelRatio || 1, 2);
      W = window.innerWidth;
      H = window.innerHeight;
      canvas.width = W * dpr;
      canvas.height = H * dpr;
      canvas.style.width = W + 'px';
      canvas.style.height = H + 'px';
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }

    window.addEventListener('resize', resize);
    resize();

    const GRAVITY = 0.45;
    const BOUNCE = 0.72;
    const FRICTION = 0.998;
    const TRAIL_LEN = 60;
    const MAX_PARTICLES = 600;
    const MAX_BALLS = 30;

    let balls = [];
    let particles = [];
    let impacts = [];
    let shakeX = 0, shakeY = 0;
    let dragging = false;
    let dragStart = null;
    let dragCurrent = null;
    let hintTimer = null;
    let frame = 0;

    class Ball {
      constructor(x, y, vx, vy, r) {
        this.x = x;
        this.y = y;
        this.vx = vx;
        this.vy = vy;
        this.r = r || 18 + Math.random() * 10;
        this.hue = Math.random() * 360;
        this.trail = [];
        this.alive = true;
        this.age = 0;
        this.spin = 0;
        this.squash = 1;
        this.squashV = 0;
      }

      update() {
        this.age++;
        this.hue = (this.hue + 0.6) % 360;

        this.trail.push({ x: this.x, y: this.y, hue: this.hue, r: this.r * this.squash });
        if (this.trail.length > TRAIL_LEN) this.trail.shift();

        this.vy += GRAVITY;
        this.vx *= FRICTION;
        this.vy *= FRICTION;
        this.x += this.vx;
        this.y += this.vy;
        this.spin += this.vx * 0.02;

        this.squashV += (1 - this.squash) * 0.3;
        this.squashV *= 0.7;
        this.squash += this.squashV;

        let bounced = false;
        let impactStrength = 0;
        let ix = this.x, iy = this.y;

        if (this.y + this.r > H) {
          this.y = H - this.r;
          impactStrength = Math.abs(this.vy);
          this.vy = -this.vy * BOUNCE;
          this.vx += (Math.random() - 0.5) * 0.5;
          bounced = true;
          iy = H;
          this.squash = 0.6 + 0.4 * (1 - Math.min(impactStrength / 20, 1));
          this.squashV = 0;
        }

        if (this.y - this.r < 0) {
          this.y = this.r;
          impactStrength = Math.abs(this.vy);
          this.vy = -this.vy * BOUNCE;
          bounced = true;
          iy = 0;
          this.squash = 0.7;
        }

        if (this.x + this.r > W) {
          this.x = W - this.r;
          impactStrength = Math.abs(this.vx);
          this.vx = -this.vx * BOUNCE;
          bounced = true;
          ix = W;
          this.squash = 0.7;
        }

        if (this.x - this.r < 0) {
          this.x = this.r;
          impactStrength = Math.abs(this.vx);
          this.vx = -this.vx * BOUNCE;
          bounced = true;
          ix = 0;
          this.squash = 0.7;
        }

        if (bounced && impactStrength > 2) {
          const count = Math.min(Math.floor(impactStrength * 3), 40);
          for (let i = 0; i < count; i++) {
            const angle = Math.random() * Math.PI * 2;
            const speed = impactStrength * (0.3 + Math.random() * 0.7);
            particles.push(new Particle(
              ix, iy,
              Math.cos(angle) * speed * 0.6,
              Math.sin(angle) * speed * 0.6 - Math.random() * 2,
              this.hue + (Math.random() - 0.5) * 40,
              0.6 + Math.random() * 0.6
            ));
          }

          impacts.push(new Impact(ix, iy, this.hue, impactStrength));

          const shakeMag = Math.min(impactStrength * 0.3, 8);
          shakeX += (Math.random() - 0.5) * shakeMag;
          shakeY += (Math.random() - 0.5) * shakeMag;
        }

        const speed = Math.sqrt(this.vx * this.vx + this.vy * this.vy);
        if (this.age > 500 && speed < 0.5 && Math.abs(this.y + this.r - H) < 2) {
          this.alive = false;
        }
      }

      draw() {
        for (let i = 0; i < this.trail.length; i++) {
          const t = this.trail[i];
          const progress = i / this.trail.length;
          const alpha = progress * 0.4;
          const size = t.r * (0.15 + 0.85 * progress);

          ctx.beginPath();
          ctx.arc(t.x, t.y, size, 0, Math.PI * 2);

          const g = ctx.createRadialGradient(t.x, t.y, 0, t.x, t.y, size);
          g.addColorStop(0, `hsla(${t.hue}, 100%, 70%, ${alpha})`);
          g.addColorStop(0.6, `hsla(${t.hue}, 100%, 50%, ${alpha * 0.5})`);
          g.addColorStop(1, `hsla(${t.hue}, 100%, 40%, 0)`);
          ctx.fillStyle = g;
          ctx.fill();
        }

        const drawR = this.r;
        const sx = 1 / this.squash;
        const sy = this.squash;

        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.scale(sx, sy);

        ctx.beginPath();
        ctx.arc(0, 0, drawR * 2.5, 0, Math.PI * 2);
        const outerGlow = ctx.createRadialGradient(0, 0, drawR * 0.5, 0, 0, drawR * 2.5);
        outerGlow.addColorStop(0, `hsla(${this.hue}, 100%, 60%, 0.3)`);
        outerGlow.addColorStop(0.4, `hsla(${this.hue}, 100%, 50%, 0.1)`);
        outerGlow.addColorStop(1, `hsla(${this.hue}, 100%, 40%, 0)`);
        ctx.fillStyle = outerGlow;
        ctx.fill();

        ctx.beginPath();
        ctx.arc(0, 0, drawR, 0, Math.PI * 2);
        const bodyGrad = ctx.createRadialGradient(
          -drawR * 0.3, -drawR * 0.3, drawR * 0.1,
          0, 0, drawR
        );
        bodyGrad.addColorStop(0, `hsla(${this.hue}, 80%, 90%, 1)`);
        bodyGrad.addColorStop(0.3, `hsla(${this.hue}, 100%, 65%, 0.95)`);
        bodyGrad.addColorStop(0.7, `hsla(${(this.hue + 30) % 360}, 100%, 45%, 0.9)`);
        bodyGrad.addColorStop(1, `hsla(${(this.hue + 60) % 360}, 100%, 25%, 0.8)`);
        ctx.fillStyle = bodyGrad;
        ctx.fill();

        ctx.beginPath();
        ctx.arc(-drawR * 0.25, -drawR * 0.25, drawR * 0.4, 0, Math.PI * 2);
        const specGrad = ctx.createRadialGradient(
          -drawR * 0.25, -drawR * 0.25, 0,
          -drawR * 0.25, -drawR * 0.25, drawR * 0.4
        );
        specGrad.addColorStop(0, 'rgba(255, 255, 255, 0.7)');
        specGrad.addColorStop(0.5, 'rgba(255, 255, 255, 0.1)');
        specGrad.addColorStop(1, 'rgba(255, 255, 255, 0)');
        ctx.fillStyle = specGrad;
        ctx.fill();

        ctx.restore();
      }
    }

    class Particle {
      constructor(x, y, vx, vy, hue, life) {
        this.x = x;
        this.y = y;
        this.vx = vx;
        this.vy = vy;
        this.hue = hue;
        this.life = life;
        this.maxLife = life;
        this.r = 1.5 + Math.random() * 2.5;
        this.alive = true;
      }

      update() {
        this.vy += GRAVITY * 0.4;
        this.vx *= 0.98;
        this.vy *= 0.98;
        this.x += this.vx;
        this.y += this.vy;
        this.life -= 0.016;

        if (this.y + this.r > H) {
          this.y = H - this.r;
          this.vy *= -0.3;
        }

        if (this.life <= 0) this.alive = false;
      }

      draw() {
        const alpha = Math.max(0, this.life / this.maxLife);
        const size = this.r * alpha;

        ctx.beginPath();
        ctx.arc(this.x, this.y, size * 3, 0, Math.PI * 2);
        const g = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, size * 3);
        g.addColorStop(0, `hsla(${this.hue}, 100%, 80%, ${alpha * 0.8})`);
        g.addColorStop(0.3, `hsla(${this.hue}, 100%, 60%, ${alpha * 0.3})`);
        g.addColorStop(1, `hsla(${this.hue}, 100%, 40%, 0)`);
        ctx.fillStyle = g;
        ctx.fill();
      }
    }

    class Impact {
      constructor(x, y, hue, strength) {
        this.x = x;
        this.y = y;
        this.hue = hue;
        this.strength = Math.min(strength, 25);
        this.radius = 0;
        this.maxRadius = this.strength * 8;
        this.life = 1;
        this.alive = true;
      }

      update() {
        this.radius += (this.maxRadius - this.radius) * 0.08;
        this.life -= 0.03;
        if (this.life <= 0) this.alive = false;
      }

      draw() {
        const alpha = Math.max(0, this.life);

        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.strokeStyle = `hsla(${this.hue}, 100%, 70%, ${alpha * 0.4})`;
        ctx.lineWidth = 2 * alpha;
        ctx.stroke();

        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius * 0.6, 0, Math.PI * 2);
        const rg = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.radius * 0.6);
        rg.addColorStop(0, `hsla(${this.hue}, 100%, 80%, ${alpha * 0.15})`);
        rg.addColorStop(1, `hsla(${this.hue}, 100%, 50%, 0)`);
        ctx.fillStyle = rg;
        ctx.fill();
      }
    }

    function spawnBall(x, y, vx, vy) {
      if (balls.length >= MAX_BALLS) {
        balls.shift();
      }
      balls.push(new Ball(x, y, vx, vy));
    }

    spawnBall(W * 0.3, H * 0.15, 6, 2);
    setTimeout(() => spawnBall(W * 0.7, H * 0.1, -4, 1), 800);
    setTimeout(() => spawnBall(W * 0.5, H * 0.05, 2, -1), 1600);

    canvas.addEventListener('mousedown', (e) => {
      dragging = true;
      dragStart = { x: e.clientX, y: e.clientY };
      dragCurrent = { x: e.clientX, y: e.clientY };

      if (!hintTimer) {
        hintTimer = true;
        hint.classList.add('hidden');
      }
    });

    canvas.addEventListener('mousemove', (e) => {
      if (dragging) {
        dragCurrent = { x: e.clientX, y: e.clientY };
      }
    });

    canvas.addEventListener('mouseup', (e) => {
      if (dragging && dragStart) {
        const dx = dragStart.x - e.clientX;
        const dy = dragStart.y - e.clientY;
        const power = Math.min(Math.sqrt(dx * dx + dy * dy) * 0.15, 25);
        const angle = Math.atan2(dy, dx);
        spawnBall(
          dragStart.x,
          dragStart.y,
          Math.cos(angle) * power,
          Math.sin(angle) * power
        );
      }
      dragging = false;
      dragStart = null;
      dragCurrent = null;
    });

    canvas.addEventListener('touchstart', (e) => {
      e.preventDefault();
      const t = e.touches[0];
      dragging = true;
      dragStart = { x: t.clientX, y: t.clientY };
      dragCurrent = { x: t.clientX, y: t.clientY };
      if (!hintTimer) {
        hintTimer = true;
        hint.classList.add('hidden');
      }
    }, { passive: false });

    canvas.addEventListener('touchmove', (e) => {
      e.preventDefault();
      if (dragging) {
        const t = e.touches[0];
        dragCurrent = { x: t.clientX, y: t.clientY };
      }
    }, { passive: false });

    canvas.addEventListener('touchend', (e) => {
      e.preventDefault();
      if (dragging && dragStart && dragCurrent) {
        const dx = dragStart.x - dragCurrent.x;
        const dy = dragStart.y - dragCurrent.y;
        const power = Math.min(Math.sqrt(dx * dx + dy * dy) * 0.15, 25);
        const angle = Math.atan2(dy, dx);
        spawnBall(
          dragStart.x,
          dragStart.y,
          Math.cos(angle) * power,
          Math.sin(angle) * power
        );
      }
      dragging = false;
      dragStart = null;
      dragCurrent = null;
    }, { passive: false });

    function drawBackground() {
      ctx.fillStyle = '#050508';
      ctx.fillRect(0, 0, W, H);

      const vignette = ctx.createRadialGradient(W / 2, H / 2, W * 0.2, W / 2, H / 2, W * 0.8);
      vignette.addColorStop(0, 'rgba(5, 5, 8, 0)');
      vignette.addColorStop(1, 'rgba(0, 0, 0, 0.5)');
      ctx.fillStyle = vignette;
      ctx.fillRect(0, 0, W, H);
    }

    function drawDragLine() {
      if (!dragging || !dragStart || !dragCurrent) return;

      const dx = dragStart.x - dragCurrent.x;
      const dy = dragStart.y - dragCurrent.y;
      const dist = Math.sqrt(dx * dx + dy * dy);

      if (dist < 5) return;

      const angle = Math.atan2(dy, dx);
      const power = Math.min(dist * 0.15, 25);
      const lineLen = power * 4;

      ctx.save();
      ctx.setLineDash([4, 6]);
      ctx.beginPath();
      ctx.moveTo(dragStart.x, dragStart.y);
      ctx.lineTo(
        dragStart.x + Math.cos(angle) * lineLen,
        dragStart.y + Math.sin(angle) * lineLen
      );
      ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
      ctx.lineWidth = 1.5;
      ctx.stroke();
      ctx.setLineDash([]);

      ctx.beginPath();
      ctx.arc(dragStart.x, dragStart.y, 6, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(255, 255, 255, 0.15)';
      ctx.fill();
      ctx.strokeStyle = 'rgba(255, 255, 255, 0.4)';
      ctx.lineWidth = 1;
      ctx.stroke();

      ctx.restore();
    }

    function loop() {
      frame++;

      shakeX *= 0.85;
      shakeY *= 0.85;

      ctx.save();
      ctx.translate(shakeX, shakeY);

      drawBackground();

      ctx.globalCompositeOperation = 'lighter';

      for (const impact of impacts) {
        impact.update();
        impact.draw();
      }
      impacts = impacts.filter(i => i.alive);

      for (const p of particles) {
        p.update();
        p.draw();
      }
      particles = particles.filter(p => p.alive);
      if (particles.length > MAX_PARTICLES) {
        particles = particles.slice(-MAX_PARTICLES);
      }

      for (const ball of balls) {
        ball.update();
        ball.draw();
      }
      balls = balls.filter(b => b.alive);

      ctx.globalCompositeOperation = 'source-over';

      drawDragLine();

      ctx.restore();

      requestAnimationFrame(loop);
    }

    requestAnimationFrame(loop);
  })();
  </script>
</body>
</html>
