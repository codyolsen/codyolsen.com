name: Deploy site

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write # OIDC token for assuming the AWS deploy role
  contents: read

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Hugo modules (Blowfish) resolve through the Go toolchain
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "0.148.2"
          extended: true

      - name: Build site
        run: hugo --gc --minify -b https://codyolsen.com/

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - name: Sync site to S3
        run: aws s3 sync public/ "s3://${{ vars.SITE_BUCKET }}" --delete

      - name: Invalidate CloudFront
        run: aws cloudfront create-invalidation --distribution-id "${{ vars.CLOUDFRONT_DISTRIBUTION_ID }}" --paths "/*"
