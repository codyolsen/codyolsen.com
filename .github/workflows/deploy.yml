name: Deploy site

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write # OIDC token for assuming the AWS deploy role
  contents: read

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # Hugo modules (Blowfish) resolve through the Go toolchain
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      # The Blowfish fork uses template fields newer than mid-2025 Hugo
      # (e.g. Language.Locale) — track latest. To pin instead, run
      # `hugo version` locally and put that version here.
      - uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "latest"
          extended: true

      - name: Build site
        env:
          # The Blowfish theme resolves from the private fork
          # github.com/codyolsen/blowfish (see the replace in go.mod), so Go
          # must fetch it over authenticated git instead of the public proxy.
          GOPRIVATE: github.com/codyolsen/*
        run: |
          git config --global url."https://x-access-token:${{ secrets.GH_MODULES_TOKEN }}@github.com/".insteadOf "https://github.com/"
          hugo --gc --minify -b https://codyolsen.com/

      - name: Configure AWS credentials (OIDC)
        # Pinned to a main-branch SHA: every tagged release (through v5.1.1)
        # still declares node20 and triggers the deprecation warning; main
        # moved to node24 on 2026-07-09. Re-pin to a tag once one ships node24.
        uses: aws-actions/configure-aws-credentials@9ae780b171afa8c5a3a6a2d154a765b709492482
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - name: Sync site to S3
        run: aws s3 sync public/ "s3://${{ vars.SITE_BUCKET }}" --delete

      - name: Invalidate CloudFront
        run: aws cloudfront create-invalidation --distribution-id "${{ vars.CLOUDFRONT_DISTRIBUTION_ID }}" --paths "/*"
